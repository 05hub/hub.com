            langToggle.innerText = currentLang === 'ar' ? 'EN' : 'AR';
            updateUI();
        });

        function updateUI() {
            tabBtns.forEach(btn => btn.innerText = currentLang === 'ar' ? btn.dataset.ar : btn.dataset.en);
            heroTitle.classList.toggle('hidden', currentTab !== 'home');
            pageContent.classList.add('fade-in');
            setTimeout(() => pageContent.classList.remove('fade-in'), 400);

            if (currentTab === 'home') {
                pageContent.innerHTML = `
                    <div class="text-center flex flex-col items-center justify-center gap-3 min-h-[180px] sm:min-h-[220px]">
                        <div class="text-3xl sm:text-4xl font-black bg-gradient-to-r from-blue-500 to-violet-500 bg-clip-text text-transparent">5HUB</div>
                        <div class="text-base sm:text-lg leading-8 text-slate-700 dark:text-slate-200 font-bold max-w-2xl mx-auto">${content[currentTab][currentLang]}</div>
                    </div>
                `;
            } else if (currentTab === 'about') {
                pageContent.innerHTML = aboutMarkup[currentLang];
            } else if (currentTab === 'experience') {
                pageContent.innerHTML = experienceMarkup[currentLang];
            } else if (currentTab === 'projects') {
                pageContent.innerHTML = projectMarkup[currentLang];
                const projectCards = pageContent.querySelectorAll('.project-card');
                projectCards.forEach(card => {
                    card.addEventListener('click', () => {
                        projectCards.forEach(item => item.classList.remove('open'));
                        card.classList.toggle('open');
                    });
                });
            } else if (currentTab === 'offers') {
                pageContent.innerHTML = offersMarkup[currentLang];
                const offerButtons = pageContent.querySelectorAll('.offer-btn');
                offerButtons.forEach(button => {
                    button.addEventListener('click', () => {
                        const packageName = button.dataset.package || 'Package';
                        const message = currentLang === 'ar'
                            ? `اهلا شركة 5HUB 👋\n\nاريد طلب ${packageName} 😊\n\nشكرا 🌹`
                            : `Hello 5HUB 👋\n\nI would like to order the ${packageName} package 😊\n\nThank you 🌹`;
                        window.open(`https://wa.me/201130063325?text=${encodeURIComponent(message)}`, '_blank');
                    });
                });
            } else {
                pageContent.innerText = content[currentTab][currentLang];
            }
        }

        tabBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                tabBtns.forEach(b => b.classList.remove('active-tab'));
                this.classList.add('active-tab');
                currentTab = this.dataset.key;
                updateUI();
            });
        });
        updateUI();
    </script>
</body>
</html>
